name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            API_URL=${{ vars.API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Transfer deployment files to VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/apps/portfolio"

          # Compose references the image as ${DOCKERHUB_USERNAME}/... so it needs an .env on the server
          printf "DOCKERHUB_USERNAME=%s\n" "${{ secrets.DOCKERHUB_USERNAME }}" > deploy.env

          rsync -avz -e "ssh -o StrictHostKeyChecking=accept-new" \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/apps/portfolio/docker-compose.yml
          rsync -avz -e "ssh -o StrictHostKeyChecking=accept-new" \
            deploy.env \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/apps/portfolio/.env

      - name: Deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd /opt/apps/portfolio
            docker compose pull
            docker compose up -d
            docker compose ps
          ENDSSH
