services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/portfolio-frontend:latest
    container_name: portfolio
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    external: true
